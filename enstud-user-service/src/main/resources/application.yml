server:
  port: 8081

spring:
  application:
    name: enstud-user-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/enstud_app?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT
jwt:
  secret: ${JWT_SECRET:enstud-app-jwt-secret-key-2024-production-must-change}

# 内部微服务地址（用于 StatsClient）
service:
  word: ${SERVICE_WORD:http://localhost:8082}
  read: ${SERVICE_READ:http://localhost:8087}
  writing: ${SERVICE_WRITING:http://localhost:8084}
  chat: ${SERVICE_CHAT:http://localhost:8083}
  forum: ${SERVICE_FORUM:http://localhost:8086}

# 日志
logging:
  level:
    com.enstud.user: DEBUG
